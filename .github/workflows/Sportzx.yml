name: Sportzx

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # Every 20 minutes (UTC = also every 20 min SGT)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome

      - name: Run Sportzx Scraper
        run: |
          python src/Sportzx.py

      - name: Commit and push updated M3U8 file
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Sportzx.m3u8
          git diff --cached --quiet || git commit -m "Updated M3U8 file with new streams"
          git push
